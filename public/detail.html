<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weather Detail</title>
    <!-- Apply saved theme before paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        var t = localStorage.getItem('ww-theme') === 'light' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-bs-theme', t);
      })();
    </script>
    <!-- Bootstrap 5 CSS (CDN) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">🌤️ World Weather</a>
        <div class="ms-auto d-flex align-items-center gap-2">
          <a class="back-link" href="index.html">← All cities</a>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="true">
            <span class="theme-icon">🌙</span>
            <span class="theme-label d-none d-sm-inline">Dark</span>
          </button>
        </div>
      </div>
    </nav>

    <main class="container py-4" id="detail-root" aria-live="polite"></main>

    <!-- Bootstrap 5 JS bundle (CDN) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="theme.js" defer></script>
    <script type="module" src="detail.js"></script>
  </body>
</html>
