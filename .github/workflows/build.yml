# Reusable workflow: installs dependencies and validates that every source
# file compiles. Called by ci.yml.
name: Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build & syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (clean)
        run: npm ci

      - name: Validate sources compile
        run: |
          node --check server.js
          find src test public -name '*.js' -print0 | xargs -0 -r -n1 node --check
