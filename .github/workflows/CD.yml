# Continuous Delivery.
#
# This workflow only starts *after* the CI workflow has finished, and it does
# real work only when that CI run **succeeded**. It then:
#
#   1. re-runs the unit tests (a final gate before publishing),
#   2. builds the Docker image from the repository Dockerfile, and
#   3. publishes the image to the GitHub Container Registry (GHCR),
#      i.e. GitHub Packages, as `nodejs-weather-forecast-component`.
#
#   CI (success) ─► test ─► build & push image to GHCR
#
name: CD

on:
  # Trigger once the CI workflow completes. The job-level guard below makes
  # sure we only publish when that CI run actually passed.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Allow manual publishing from the Actions tab as well.
  workflow_dispatch:

# GITHUB_TOKEN needs write access to packages to push to GHCR.
permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # Registry names must be lowercase, so the published package is
  # `nodejs-weather-forecast-component`.
  IMAGE_NAME: nodejs-weather-forecast-component

jobs:
  # Final test gate. Runs only when triggered manually or when the CI run that
  # triggered us succeeded.
  test:
    name: Tests
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/test.yml
    secrets:
      AZURE_MAPS_KEY_SECRET: ${{ secrets.AZURE_MAPS_KEY_SECRET }}

  publish:
    name: Build & publish image to GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout the commit that passed CI
        uses: actions/checkout@v5
        with:
          # Build the exact commit CI validated (falls back to the ref for
          # manual runs).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image reference automatically.
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
